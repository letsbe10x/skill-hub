schema_version: "2"

workflow:
  id: "lets-develop-feature"
  version: "3.2.0"
  description: "Feature development with intake discovery, upstream delegation, staged execution, and evidence-gated handoff."
  run_layout:
    runs_root: "spec-colocated"
    note: "Store runs alongside the spec source, not in the target repo. See SKILL.md 'Run State' section."

rigor_levels: ["MINIMAL", "STANDARD", "ELEVATED", "FULL"]
control_levels: ["autonomous", "checkpoints", "collaborative"]

phases:
  - id: "intake"
    title: "Phase 0: Intake & Discovery"

stages:
  - id: "ground"
    title: "Stage 1: Ground in repo context"
  - id: "classify"
    title: "Stage 2: Classify change type/scale/risk"
  - id: "plan"
    title: "Stage 3: Build execution packet from spec"
  - id: "architecture"
    title: "Stage 4: Architecture boundary check"
  - id: "checkpoint"
    title: "Stage 5: Plan checkpoint"
  - id: "implement"
    title: "Stage 6: Implement story tasks bounded by packet"
  - id: "test"
    title: "Stage 7: Write/run verification"
  - id: "verify"
    title: "Stage 8: Evidence gate"
    gate:
      scripts:
        - path: scripts/verify_scenarios.py
          args: ["${run_dir}/scenario-matrix.json", "${repo_root}"]
          intensity: ["STANDARD", "ELEVATED", "FULL"]
        - path: scripts/verify_stitch.py
          args: ["${run_dir}/execution-packet.json", "${repo_root}"]
          intensity: ["STANDARD", "ELEVATED", "FULL"]
        - path: scripts/verify_spec_coverage.py
          args: ["${run_dir}/spec-requirements.json", "${repo_root}"]
          intensity: ["ELEVATED", "FULL"]
      on_fail: loop_back
      loop_target: implement
      max_iterations: 2
      carry_forward: true
      deferral_policy:
        MINIMAL:
          max_deferred: null
        STANDARD:
          max_deferred: 3
          severity_allowed: ["minor"]
        ELEVATED:
          max_deferred: 1
          severity_allowed: ["minor"]
        FULL:
          max_deferred: 0
  - id: "complete"
    title: "Stage 9: Handoff to verify-change"
    requires: ["verify.passed"]

artifacts:
  # State management (STANDARD+ — the resumability anchor)
  - id: "run_state"
    path: "run-state.md"
    required_for: ["STANDARD", "ELEVATED", "FULL"]
    description: "Single source of truth for run progress. Updated at every stage/package transition."
  # Required artifacts (all rigor levels)
  - id: "execution_packet"
    path: "execution-packet.md"
    required_for: ["MINIMAL", "STANDARD", "ELEVATED", "FULL"]
  - id: "verification_record"
    path: "verification-record.md"
    required_for: ["MINIMAL", "STANDARD", "ELEVATED", "FULL"]
  - id: "handoff"
    path: "handoff.md"
    required_for: ["MINIMAL", "STANDARD", "ELEVATED", "FULL"]
  # STANDARD+ artifacts
  - id: "story_tasks"
    path: "story-tasks.md"
    required_for: ["STANDARD", "ELEVATED", "FULL"]
  - id: "scenario_matrix"
    path: "scenario-matrix.md"
    required_for: ["STANDARD", "ELEVATED", "FULL"]
  # ELEVATED+ artifacts
  - id: "design_artifacts"
    path: "design-artifacts.md"
    required_for: ["ELEVATED", "FULL"]
  - id: "journey_link"
    path: "journey-link.md"
    required_for: ["ELEVATED", "FULL"]
  - id: "traceability"
    path: "traceability.md"
    required_for: ["ELEVATED", "FULL"]
  # Optional audit trail
  - id: "intake_audit"
    path: "intake/"
    required_for: []
    description: "Phase 0 audit trail — write if you want resumability"
  - id: "upstream_artifacts"
    path: "upstream/"
    required_for: []
    description: "Artifacts from delegated skills — write if received"
  # Structured JSON artifacts for verification loop
  - id: "scenario_matrix_json"
    path: "scenario-matrix.json"
    required_for: ["STANDARD", "ELEVATED", "FULL"]
    description: "Machine-readable scenario matrix consumed by verify_scenarios.py"
  - id: "execution_packet_json"
    path: "execution-packet.json"
    required_for: ["STANDARD", "ELEVATED", "FULL"]
    description: "Machine-readable execution packet with stitch points consumed by verify_stitch.py"
  - id: "spec_requirements_json"
    path: "spec-requirements.json"
    required_for: ["ELEVATED", "FULL"]
    description: "Machine-readable spec requirements consumed by verify_spec_coverage.py"
  - id: "gap_ledger"
    path: "gap-ledger.json"
    required_for: []
    description: "Produced only when verification gaps exist — drives the loop-back protocol"
