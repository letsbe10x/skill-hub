schema_version: "2"

workflow:
  id: "lets-develop-feature"
  version: "3.1.0"
  description: "Feature development with intake discovery, upstream delegation, staged execution, and evidence-gated handoff."
  run_layout:
    runs_root: ".lets/runs"

rigor_levels: ["MINIMAL", "STANDARD", "ELEVATED", "FULL"]
control_levels: ["autonomous", "checkpoints", "collaborative"]

phases:
  - id: "intake"
    title: "Phase 0: Intake & Discovery"

stages:
  - id: "ground"
    title: "Stage 1: Ground in repo context"
  - id: "classify"
    title: "Stage 2: Classify change type/scale/risk"
  - id: "plan"
    title: "Stage 3: Build execution packet from spec"
  - id: "architecture"
    title: "Stage 4: Architecture boundary check"
  - id: "checkpoint"
    title: "Stage 5: Plan checkpoint"
  - id: "implement"
    title: "Stage 6: Implement story tasks bounded by packet"
  - id: "test"
    title: "Stage 7: Write/run verification"
  - id: "verify"
    title: "Stage 8: Evidence gate"
  - id: "complete"
    title: "Stage 9: Handoff to verify-change"

artifacts:
  # Required artifacts (all rigor levels)
  - id: "execution_packet"
    path: "execution-packet.md"
    required_for: ["MINIMAL", "STANDARD", "ELEVATED", "FULL"]
  - id: "verification_record"
    path: "verification-record.md"
    required_for: ["MINIMAL", "STANDARD", "ELEVATED", "FULL"]
  - id: "handoff"
    path: "handoff.md"
    required_for: ["MINIMAL", "STANDARD", "ELEVATED", "FULL"]
  # STANDARD+ artifacts
  - id: "story_tasks"
    path: "story-tasks.md"
    required_for: ["STANDARD", "ELEVATED", "FULL"]
  - id: "scenario_matrix"
    path: "scenario-matrix.md"
    required_for: ["STANDARD", "ELEVATED", "FULL"]
  # ELEVATED+ artifacts
  - id: "design_artifacts"
    path: "design-artifacts.md"
    required_for: ["ELEVATED", "FULL"]
  - id: "journey_link"
    path: "journey-link.md"
    required_for: ["ELEVATED", "FULL"]
  - id: "traceability"
    path: "traceability.md"
    required_for: ["ELEVATED", "FULL"]
  # Optional audit trail
  - id: "intake_audit"
    path: "intake/"
    required_for: []
    description: "Phase 0 audit trail — write if you want resumability"
  - id: "upstream_artifacts"
    path: "upstream/"
    required_for: []
    description: "Artifacts from delegated skills — write if received"
